name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: oazyse
  REGION: us-central1
  SERVICE: oazyse-os
  IMAGE: us-central1-docker.pkg.dev/oazyse/oazyse-os/oazyse-os

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/944246130029/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@oazyse.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --min-instances 1 \
            --set-secrets="SOLANA_WALLET_JSON=oazyse-wallet:latest,GEMINI_API_KEY=oazyse-gemini-key:latest" \
            --set-env-vars="NODE_ENV=production,AUTONOMOUS_AGENT=true,AUTO_INTERVAL_MS=60000,SOLANA_NETWORK=devnet" \
            --quiet

      - name: Show deployed URL
        run: |
          echo "✅ Deployed: $(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format='value(status.url)')"
